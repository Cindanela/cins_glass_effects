name: cins_glass_effects
description: "A Flutter package that provides a collection of glass effects for your Flutter applications. This package includes various glass effects that can be easily integrated into your Flutter projects to create visually appealing and modern user interfaces."
version: 0.0.1
homepage: https://github.com/Cindanela/cins_glass_effects

environment:
  sdk: ^3.12.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  shaders:
    - shaders/glass.frag
